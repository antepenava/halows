<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Oops! Page Not Found</title>
        <style>
            body {
                text-align: center;
                font-family: Arial, sans-serif;
                background-color: #00232F;
            }
            .container {
                margin: 5% auto 2% auto;
                padding: 20px;
                background-color: #FEFBE2;
                border-radius: 5px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }.errorimg {
                margin: 2% auto;
            }
            h1 {
                color: #C55A11;
                font-size: 72px;
            }
            p {
                color: #00232F;
                font-size: 24px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Page Not Found</h1>
            <p>Sorry, the page you are looking for is nowhere to be seen!</p>
            <div>
                <div class="errorimg">
                    <img src="404-page-not-found.svg" alt="Page Not Found" width="40%" height="40%">
                </div>
            </div>
        </div>
        <div>
            <img src="halopv_logo_light.png" alt="Page Not Found" width="10%" height="10%">
        <div>
    </body>
</html>
